- id: rip0005-branch-rebased
  name: RIP 5 Branch Rebased
  entry: bin/rip0005-branch-rebased.sh
  language: script
  pass_filenames: false
  always_run: true
  stages: [pre-push]
  description: |
      Checks that the current branch contains the latest tips of
      `origin/main`, `origin/master`, and `origin/develop`.

- id: rip0005-merge-rebased
  name: RIP 5 Merge Rebased
  entry: bin/rip0005-merge-rebased.sh
  language: script
  pass_filenames: false
  always_run: true
  stages: [commit-msg]
  description: |
      Checks that the merge source is rebased on the current destination branch
      in `origin`.

- id: rip0005-protected-branch-commit
  name: RIP 5 Protected Branch Commit
  entry: bin/rip0005-protected-branch-commit.sh
  language: script
  pass_filenames: true
  always_run: true
  stages: [commit-msg]
  description: |
      Blocks direct commits on `main`, `master`, and `develop`.

- id: rip0005-protected-branch-merge-only
  name: RIP 5 Protected Branch Merge Only
  entry: bin/rip0005-protected-branch-merge-only.sh
  language: script
  pass_filenames: false
  always_run: true
  stages: [pre-push]
  description: |
      Blocks protected-branch updates whose new mainline commits are not merge
      commits.
