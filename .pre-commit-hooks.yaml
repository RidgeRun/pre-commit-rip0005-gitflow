- id: rip0005-gitflow
  name: RIP 5 GitFlow
  entry: bin/rip0005-gitflow.sh
  language: script
  pass_filenames: true
  always_run: true
  stages: [pre-push, commit-msg]
  description: |
      Runs the RIP 5 GitFlow checks as a single hook. On `pre-push` it validates
      that the current branch is rebased on the shared branches and blocks
      fast-forward/direct updates on protected branches. On `commit-msg` it
      blocks direct commits on protected branches and validates merge commits
      against the destination branch.
